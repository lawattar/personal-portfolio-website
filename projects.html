<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Laith Wattar</title>
    <link rel="stylesheet" href="/projects.css" />
  </head>
  <body>
    <div class="projects-shell">
      <header class="projects-top">
        <a class="projects-brand" href="/index.html">LAITH WATTAR - Portfolio</a>
        <nav class="projects-top-nav" aria-label="Projects page navigation">
          <a href="/index.html">Home</a>
          <a href="/resume.pdf" download>Resume</a>
        </nav>
      </header>

      <section class="projects-tabs-wrap" aria-label="Project categories">
        <div class="projects-tabs" role="tablist" aria-label="Project tabs">
          <button class="projects-tab is-active" role="tab" aria-selected="true" data-tab="featured">
            Featured
          </button>
          <button class="projects-tab" role="tab" aria-selected="false" data-tab="baja">
            BAJA
          </button>
          <button class="projects-tab" role="tab" aria-selected="false" data-tab="coding">
            Coding
          </button>
          <button class="projects-tab" role="tab" aria-selected="false" data-tab="experience">
            Work Experience
          </button>
          <button class="projects-tab" role="tab" aria-selected="false" data-tab="athletics">
            Athletics
          </button>
          <button class="projects-tab" role="tab" aria-selected="false" data-tab="leadership">
            Leadership
          </button>
        </div>
        <p class="projects-last-updated">
          Last Updated:
          <time datetime="2026-05-13">May 13, 2026</time>
        </p>
      </section>

      <section class="baja-showcase" data-baja-showcase="true" aria-label="BAJA photo slideshow">
        <div class="baja-showcase-frame">
          <div class="baja-showcase-track" aria-hidden="true">
            <img class="baja-showcase-image baja-showcase-image-current" alt="" />
            <img class="baja-showcase-image baja-showcase-image-next" alt="" />
          </div>
          <button class="baja-showcase-arrow baja-showcase-arrow-prev" type="button" aria-label="Previous BAJA photo">
            &#8249;
          </button>
          <button class="baja-showcase-arrow baja-showcase-arrow-next" type="button" aria-label="Next BAJA photo">
            &#8250;
          </button>
          <div class="baja-showcase-dots" aria-label="BAJA slideshow dots"></div>
          <div class="baja-showcase-empty">Add photos to <code>public/portfolio-images/baja-gallery/</code></div>
        </div>
      </section>

      <main class="projects-panels">
        <section class="projects-panel is-active" data-panel="featured" role="tabpanel"></section>
        <section class="projects-panel" data-panel="baja" role="tabpanel"></section>
        <section class="projects-panel" data-panel="coding" role="tabpanel"></section>
        <section class="projects-panel" data-panel="experience" role="tabpanel"></section>
        <section class="projects-panel" data-panel="athletics" role="tabpanel"></section>
        <section class="projects-panel" data-panel="leadership" role="tabpanel"></section>
      </main>
    </div>

    <div class="scroll-hint" aria-hidden="true" title="Scroll for more content">
      <svg viewBox="0 0 24 24" focusable="false">
        <circle cx="12" cy="12" r="9.2"></circle>
        <path d="M12 7.2v8.6"></path>
        <path d="M8.8 12.8 12 16l3.2-3.2"></path>
      </svg>
    </div>

    <script type="module" src="/projects.js"></script>
  </body>
</html>
